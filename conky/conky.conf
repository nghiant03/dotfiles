conky.config ={
  -- CONKY SETTINGS
  background = true,
  update_interval = 1,
  total_run_times = 0,
  
  cpu_avg_samples = 2,
  net_avg_samples = 2,
  
  override_utf8_locale = true,
  
  double_buffer = true,
  no_buffers = true,
  
  text_buffer_size = 32768,
  
  -- CONKY: WINDOW SPECIFICATIONS
  own_window = true,
  own_window_argb_value = 75,
  own_window_argb_visual = true,
  own_window_class = 'conky-semi',
  own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',
  own_window_transparent = true,
  -- own_window_transparent = false,
  own_window_type = 'normal',
  -- own_window_type = 'desktop',

  border_inner_margin = 6,
  border_width = 5, 

  minimum_height = 1020,

  minimum_width = 200,
  maximum_width = 200,

  alignment = 'top_right',
  gap_x = 10,
  gap_y = 15,

  -- GRAPHICS SETTINGS
  draw_shades = false,
  draw_outline = true,
  draw_borders = false,
  draw_graph_borders = true,
  -- draw_graph_borders = false,
  double_buffer = true,

  -- TEXT SETTINGS
  use_xft = true,
  font = 'Roboto:size=8',

  uppercase = false,

  -- Pad percentages to this many decimals (0 = no padding)
  pad_percents = 2,

  -- COLOUR SETTINGS
  default_color = '777777',
  default_shade_color = '222222',
  default_outline_color = '111111',
  -- default_outline_color = '010101',
  color1 = 'c71010',
  color2 = '188f18',
  color3 = 'EEEEEE',
  color4 = '444444',
  color5 = '555555',
  color6 = '666666',
  color7 = '3b71a1',
};


conky.text = [[
${font :size=10}SYSTEM ${hr 1}${font}
${voffset -10}
Hostname: ${alignr}$nodename 
OS: ${alignr}${exec lsb_release -d| awk '{$1=""; print $0}'}
Kernel: ${alignr}$kernel
Uptime: ${alignr}$uptime_short
${voffset -8}
${font :size=10}CPUs ${hr 1}${font}
${voffset -10}
CPU: ${alignr}${exec lscpu | grep 'Model name' | awk -F: '{print $2}' | awk '{print $NF}'}
${font :size=9}01 - 04:${font} ${goto 70}${color2}${cpu cpu1}% ${goto 110}${cpu cpu2 }% ${goto 150}${cpu cpu3 }% ${goto 190}${cpu cpu4 }%${color}
${font :size=9}05 - 08:${font} ${goto 70}${color2}${cpu cpu5}% ${goto 110}${cpu cpu6 }% ${goto 150}${cpu cpu7 }% ${goto 190}${cpu cpu8 }%${color}
${font :size=9}09 - 12:${font} ${goto 70}${color2}${cpu cpu9}% ${goto 110}${cpu cpu10}% ${goto 150}${cpu cpu11}% ${goto 190}${cpu cpu12}%${color}
${font :size=9}13 - 16:${font} ${goto 70}${color2}${cpu cpu13}% ${goto 110}${cpu cpu14}% ${goto 150}${cpu cpu15}% ${goto 190}${cpu cpu16}%${color}
${voffset -8}
CPU Temp:${font} ${font :size=9}${alignr}${color1}${hwmon 1 temp 1}°C${color}
${voffset -8}
${font :size=10}${color}Network ${color}${hr 1}${color}${font}
${voffset -10}
IP Address: ${alignr}${addr wlan0}
${if_match "${addr wlan0}"!="No Address"}
${font :size=09}Download ${alignr}${downspeedf wlan0}k/s (${totaldown wlan0})${font}
${color3}${downspeedgraph wlan0 25,200 ADFF2F 32CD32 -t}${color}
${font :size=9}Upload ${alignr}${upspeedf wlan0}k/s (${totalup wlan0})${font}
${color3}${upspeedgraph wlan0 25,200 FF0000 8B0000 -t}${color}
${endif}
${font :size=10}HDD ${hr 1}${font}
${voffset -10}
${font :size=9}Used: ${fs_used /}${goto 140}Free: ${fs_free /}${font}
${voffset -8}
${fs_bar /}
${voffset -8}
${font :size=9}Disk I/O: ${alignr}$diskio${font}
${voffset 2}${font :size=9}Read: ${goto 60}${color3}${diskiograph_read 15, 150 ADFF2F 32CD32 750}${color}
${voffset 2}${font :size=9}Write: ${goto 60}${color3}${diskiograph_write 15, 150 FF0000 8B0000 750}${color}
${voffset -8}
${font :size=10}Memory ${hr 1}
${voffset -10}
${font :size=9}RAM ${alignc}     $mem / $memmax ${alignr} ${color2}$memperc%${font}${color}
$membar
${voffset -8}
${font :size=10}GPU ${hr 1}
${voffset -10}
${font :size=9}iGPU: ${alignr}${exec lspci | grep VGA | cut -c 40-68 | sed 's/Corporation//;s/  / /g'}${font}
${font :size=9}GPU Speed: ${alignr}${execi 1 "cat /sys/class/drm/card1/gt_cur_freq_mhz"}MHz${font}
${font :size=9}Max GPU Speed: ${alignr}${exec cat /sys/class/drm/card1/gt_max_freq_mhz}MHz${font}
${voffset -8}
${font :size=10}PROCESSES ${hr 1}${font}
${voffset -10} 
${font :size=9}Total: ${alignr}${color1}${processes}${font}${color}
${voffset -8}
${font :size=9}App Name ${alignr}Memory     CPU
${font :size=9}${top_mem name 1} ${alignr}${color2}${top mem 1} % ${top cpu 1} %${color}
${font :size=9}${top_mem name 2} ${alignr}${color2}${top mem 2} % ${top cpu 2} %${color}
${font :size=9}${top_mem name 3} ${alignr}${color2}${top mem 3} % ${top cpu 3} %${color}
${font :size=9}${top_mem name 4} ${alignr}${color2}${top mem 4} % ${top cpu 4} %${color}
${font :size=9}${top_mem name 5} ${alignr}${color2}${top mem 5} % ${top cpu 5} %${color}
]];
